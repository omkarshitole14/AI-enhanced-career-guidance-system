<!DOCTYPE html>
<html>
<head>

    <title>AI Career Guidance System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">
            AI Enhanced Career Guidance System
        </h2>
        <div class="text-end mb-3">

            <a href="/about" class="btn btn-secondary">

                About Project

            </a>

        </div>
        <form action="/predict"
              method="POST"
              enctype="multipart/form-data">

            <div class="mb-3">

                <label class="form-label">
                    Education Level
                </label>

                <select class="form-control"
                        name="education"
                        required>

                    <option value="">
                        Select
                    </option>

                    <option>
                        Bachelor's
                    </option>

                    <option>
                        Master's
                    </option>

                    <option>
                        Diploma
                    </option>

                    <option>
                        PhD
                    </option>

                </select>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Specialization
                </label>

                <input type="text"
                       class="form-control"
                       name="specialization"
                       required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Skills
                </label>

                <input type="text"
                       class="form-control"
                       name="skills"
                       placeholder="Python, SQL, Machine Learning"
                       required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Certification
                </label>

                <input type="text"
                       class="form-control"
                       name="certification">

            </div>

            <div class="mb-3">

                <label class="form-label">
                    CGPA / Percentage
                </label>

                <input type="number"
                       step="0.01"
                       class="form-control"
                       name="cgpa"
                       required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Upload Resume (PDF)
                </label>

                <input type="file"
                       class="form-control"
                       name="resume"
                       accept=".pdf"
                       required>

            </div>

            <button type="submit"
                    class="btn btn-primary w-100">

                Get Career Recommendation

            </button>

        </form>

    </div>

</div>

</body>
</html>
